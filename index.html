<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.io.png" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Fat Boy</title>
  </head>
  <body>
    <header class="main-header">
      <a class="logo" href="index.html" title="Retornar a página inicial">
        <img
          class="logo-fatboy"
          src="img/logo-fatboy.png"
          alt="logo branco fatboy"
        />
      </a>
      <nav class="main-nav">
        <ul class="list-links">
          <li><a href="#">HOME</a></li>
          <li><a href="#">CARDÁPIO</a></li>
          <li><a href="#">PROGRAMAÇÃO</a></li>
        </ul>
        <a class="btn-reservas" href="#">RESERVAS</a>
      </nav>
    </header>
    <main>
      <div class="faixa"></div>
      <section class="hero"></section>
      <section class="cardapio">
        <h2>CARDÁPIO</h2>

        <div class="grid-cardapio">
          <a href="#" class="card">
            <img
              src="./img/cardapio/entrada-e-porcoes.png"
              alt="Entrada e porções"
            />
            <h3>Entrada <br />e porções</h3>
          </a>

          <a href="#" class="card">
            <img src="./img/cardapio/american-bbq.png" alt="American BBQ" />
            <h3>American <br />BBQ</h3>
          </a>
          <a href="#" class="card">
            <img src="./img/cardapio/brazilian-bbq.png" alt="Brazilian BBQ" />
            <h3>Brazilian <br />BBQ</h3>
          </a>

          <a href="#" class="card">
            <img src="./img/cardapio/saladas.png" alt="Saladas" />
            <h3>Saladas</h3>
          </a>

          <a href="#" class="card">
            <img src="./img/cardapio/kids.png" alt="Kids" />
            <h3>Pratos Kids</h3>
          </a>

          <a href="#" class="card">
            <img src="./img/cardapio/burguer.png" alt="Burguer e Lanches" />
            <h3>Burguer <br />e Lanches</h3>
          </a>

          <a href="#" class="card">
            <img src="./img/cardapio/sobremesas.png" alt="Sobremesas" />
            <h3>Sobremesas</h3>
          </a>

          <a href="#" class="card">
            <img src="./img/cardapio/bebidas.png" alt="Bebidas" />
            <h3>Bebidas</h3>
          </a>

          <a href="#" class="card">
            <img src="./img/cardapio/cervejas.png" alt="Cervejas" />
            <h3>Cervejas</h3>
          </a>

          <a href="#" class="card">
            <img src="./img/cardapio/chopp.png" alt="Chopps" />
            <h3>Chopps</h3>
          </a>
          <a href="#" class="card">
            <img src="./img/cardapio/vinho.png" alt="Vinho" />
            <h3>Vinho</h3>
          </a>
          <a href="#" class="card">
            <img src="./img/cardapio/drinks.png" alt="Drinks" />
            <h3>Drinks</h3>
          </a>
          <a href="#" class="card">
            <img src="./img/cardapio/adicional.png" alt="Adicionais" />
            <h3>Adicionais</h3>
          </a>

          <a href="#" class="card">
            <img src="./img/cardapio/lojinha.png" alt="Lojinha" />
            <h3>Lojinha</h3>
          </a>
        </div>
      </section>
    </main>

</html>
